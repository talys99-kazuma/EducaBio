<script>
const btn = document.getElementById("menu-mobile-btn");
const menu = document.getElementById("menu-links");
const overlay = document.getElementById("overlay");

/* abrir / fechar menu */
function toggleMenu() {
  btn.classList.toggle("ativo");
  menu.classList.toggle("ativo");
  overlay.classList.toggle("ativo");
  document.body.classList.toggle("menu-aberto");
}

btn.addEventListener("click", toggleMenu);
overlay.addEventListener("click", toggleMenu);

/* fechar ao clicar em um link */
document.querySelectorAll(".menu-links a").forEach(link => {
  link.addEventListener("click", toggleMenu);
});

/* destacar página ativa */
const paginaAtual = location.pathname.split("/").pop();
document.querySelectorAll(".menu-links a").forEach(link => {
  if (link.getAttribute("href") === paginaAtual) {
    link.classList.add("ativo");
  }
});

// =============================
// FUNÇÃO DE RESET + REDIRECIONAMENTO
// =============================
function resetGlobal() {
    let versao = localStorage.getItem("versaoGlobal") || "1";
    let novaVersao = parseInt(versao) + 1;

    localStorage.setItem("versaoGlobal", novaVersao.toString());

    alert("Reset ativado! Redirecionando para o questionário...");

    // Redireciona para o index na pasta anterior
    window.location.href = "../index.html";
}

// =============================
// OPÇÃO 1 - 7 cliques no logo
// =============================
let contadorCliques = 0;

document.getElementById("logoAdmin").addEventListener("click", function() {
    contadorCliques++;

    if (contadorCliques === 7) {
        resetGlobal();
        contadorCliques = 0;
    }

    setTimeout(() => {
        contadorCliques = 0;
    }, 3000);
});

// =============================
// OPÇÃO 2 - Código secreto
// =============================
let senhaDigitada = "";
const senhaSecreta = "ADMIN123";

document.addEventListener("keydown", function(e) {
    senhaDigitada += e.key.toUpperCase();

    if (senhaDigitada.includes(senhaSecreta)) {
        resetGlobal();
        senhaDigitada = "";
    }

    if (senhaDigitada.length > 20) {
        senhaDigitada = "";
    }
});
</script>

</body>
