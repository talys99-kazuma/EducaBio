<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Descrição que aparece ao compartilhar -->
    <meta name="description" content="Site educativo sobre biomas brasileiros e seus impactos ambientais.">
    <!-- Metatags para redes sociais (Open Graph) -->
    <meta property="og:title" content="EducaBio - Biomas Brasileiros e Impactos Ambientais">
    <meta property="og:description" content="Descubra os biomas brasileiros e os impactos ambientais de forma interativa e educativa.">
    <meta property="og:url" content="https://talys99-kazuma.github.io/EducaBio/">
    <meta property="og:type" content="website">
  <!-- Imagem de prévia (aparece no WhatsApp, Facebook, etc.) -->
    <meta property="og:image" content="https://talys99-kazuma.github.io/EducaBio/assets/img/capa.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <title>EducaBio - Biomas Brasileiros e Impactos Ambientais</title>
    <link rel="shortcut icon" href="assets/img/icone1.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
    <header class="quiz-header">
        <div class="header-content">
            <img src="assets/img/logo educabio.png" style="max-width:300px;" alt="logo educabio">
        </div>
    </header>

    <main class="quiz-main">
        <div class="quiz-intro">
            <div class="intro-icon">🌎</div>
            <h2>Questionário Diagnóstico</h2>
            <p class="intro-text">Antes de começar, gostaríamos de conhecer seu nível de conhecimento sobre biomas brasileiros e impactos ambientais.</p>
            
        </div>

        <div class="biomes-wrapper">
        <div class="biomes-showcase">
            
            <div class="biome-card">
                <img src="assets/img/amazonia.jpg" data-source="https://www.istockphoto.com/br/fotos/floresta-amaz%C3%B4nica" alt="Amazônia" class="biome-img">
                <span class="biome-name">Amazônia</span>
            </div>
            <div class="biome-card">
                <img src="assets/img/cerrado.jpg" data-source="https://www.coladaweb.com/geografia-do-brasil/biomas-brasileiros" alt="Cerrado" class="biome-img">
                <span class="biome-name">Cerrado</span>
            </div>
            <div class="biome-card">
                <img src="assets/img/matatlantica.jpg" data-source="https://www.linkedin.com/pulse/mata-atl%C3%A2ntica-o-bioma-que-conta-hist%C3%B3ria-do-brasil-mariana-giozza" alt="Mata Atlântica" class="biome-img">
                <span class="biome-name">Mata Atlântica</span>
            </div>
            <div class="biome-card">
                <img src="assets/img/caatinga.png" alt="Caatinga" class="biome-img">
                <span class="biome-name">Caatinga</span>
            </div>
            <div class="biome-card">
                <img src="assets/img/pampa.jpg" alt="Pampa" data-source="https://escolaeducacao.com.br/wp-content/uploads/2019/11/bioma-pampa-1024x664.jpg" class="biome-img">
                <span class="biome-name">Pampa</span>
            </div>
            <div class="biome-card">
                <img src="assets/img/Pantanal.jpeg" alt="Pantanal" data-source="https://g1.globo.com/ms/mato-grosso-do-sul/noticia/2023/11/28/lei-do-pantanal-projeto-entregue-tenta-equilibrar-preservacao-e-exploracao-no-bioma.ghtml" class="biome-img">
                <span class="biome-name">Pantanal</span>
            </div>
        </div>
        </div>

        <form id="diagnostic-form" class="quiz-form">
            <input type="hidden" id="google-form-url" value="SEU_LINK_GOOGLE_FORMS_AQUI">
            
            <div id="questions-container" class="questions-container"></div>

            <div class="form-actions">
                <button type="button" id="submit-btn" class="btn-submit">
                    <span>Enviar Respostas</span>
                    <span class="btn-icon">➜</span>
                </button>
            </div>

            <div id="result-message" class="result-message hidden"></div>
        </form>
    </main>

   <footer>
 EducaBio &copy; 2025 | Portal Educacional
</footer>
    <script src="assets/js/index.js"></script>
</body>
</html>
